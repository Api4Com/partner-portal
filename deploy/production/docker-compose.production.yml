# Produção do partner-portal (SÓ o portal) no host tools1.api4com.com (136.248.85.42).
#
# Modelo NATIVO do tools1: Docker standalone + docker-compose, nginx no host
# (TLS via cert wildcard *.api4com.com em /var/www/api4com/certs), rede bridge
# externa `platform_shared`. Um dir/compose por serviço (convenção do host).
#
# O BFF tem o SEU próprio set de deploy no repo partner-portal-bff
# (deploy/production/): compose, vhost e env. Os dois sobem na mesma
# platform_shared, então o portal alcança o BFF no SSR por `partner-portal-bff-prod:3000`.
#
# O container publica SÓ em 127.0.0.1 (o nginx do host expõe 443).
# Env real fica em .env.production (a partir do .example), NO HOST, fora do git.
#
# Deploy (no tools1, em /var/www/html/partner-portal/):
#   aws ecr get-login-password --region us-east-1 \
#     | docker login --username AWS --password-stdin 824572654562.dkr.ecr.us-east-1.amazonaws.com
#   docker compose -f docker-compose.production.yml pull
#   docker compose -f docker-compose.production.yml up -d

services:
  partner-portal:
    image: 824572654562.dkr.ecr.us-east-1.amazonaws.com/partner-portal:${PORTAL_TAG:-production}
    container_name: partner-portal-prod
    restart: unless-stopped
    ports:
      - '127.0.0.1:3020:3000'
    networks: [shared]
    env_file: .env.production
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  shared:
    name: platform_shared
    driver: bridge
    external: true
