# /etc/nginx/conf.d/partners-bff.api4com.conf  (host tools1)
# BFF do parceiro → container partner-portal-bff-prod (127.0.0.1:3021).
# Cert wildcard *.api4com.com já cobre este host.
#
# Escala pra 2 réplicas: adicione o 2º container (127.0.0.1:3022) e uma linha
# `server 127.0.0.1:3022;` no upstream — o nginx round-robina.

upstream partners_bff {
    server 127.0.0.1:3021;
    # server 127.0.0.1:3022;   # 2ª réplica (quando escalar)
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name partners-bff.api4com.com;
    server_tokens off;
    client_max_body_size 10M;

    ssl_certificate /var/www/api4com/certs/public.crt;
    ssl_certificate_key /var/www/api4com/certs/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://partners_bff/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Obrigatório: o BFF marca o refresh cookie como `secure` e usa req.ip —
        # sem X-Forwarded-Proto ele acha que é HTTP; sem X-Forwarded-For, perde o IP.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
        proxy_send_timeout 120;
    }
}
