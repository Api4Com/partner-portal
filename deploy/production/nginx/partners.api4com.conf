# /etc/nginx/conf.d/partners.api4com.conf  (host tools1)
# Portal do parceiro → container partner-portal-prod (127.0.0.1:3020).
# Cert wildcard *.api4com.com já cobre este host (sem emissão por domínio).

upstream partners_portal {
    server 127.0.0.1:3020;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name partners.api4com.com;
    server_tokens off;
    client_max_body_size 10M;

    ssl_certificate /var/www/api4com/certs/public.crt;
    ssl_certificate_key /var/www/api4com/certs/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://partners_portal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        # HTTPS/real-IP para o Nitro (SSR) atrás do proxy:
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
        proxy_send_timeout 120;
    }
}
